<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mr Nonchalant Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="hero">

<h2>MR NONCHALANT ADMIN PANEL</h2>

<p>Add and manage VPN configurations</p>


<div class="search">
<input id="name" type="text" placeholder="Config name">
</div>


<div class="search">
<input id="type" type="text" placeholder="Tunnel type (TLS, NPV, HA...)">
</div>


<div class="search">
<input id="description" type="text" placeholder="Config description">
</div>


<div class="search">
<input id="link" type="text" placeholder="Download link">
</div>


<button onclick="addConfig()">
UPLOAD CONFIG
</button>


</div>


<script>

function addConfig(){

let config = {

name: document.getElementById("name").value,

type: document.getElementById("type").value,

description: document.getElementById("description").value,

link: document.getElementById("link").value

};


if(!config.name || !config.type || !config.link){

alert("Please fill in all required fields");

return;

}


let configs = JSON.parse(localStorage.getItem("configs")) || [];


configs.push(config);


localStorage.setItem(
"configs",
JSON.stringify(configs)
);


alert("Configuration uploaded successfully!");


// Clear inputs

document.getElementById("name").value="";
document.getElementById("type").value="";
document.getElementById("description").value="";
document.getElementById("link").value="";


}

</script>


</body>

</html>
